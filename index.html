<!DOCTYPE html>
<html lang="ja">
<head>

  <meta property="og:title" content="オナニーが終わったらこのエクを投稿してください">
  <meta property="og:description" content="オナニーが終わったらこのエクを投稿してください">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 720px;
      width: 100%;
    }

    h1 {
      color: #e0e0e0;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }

    .image-wrapper {
      margin-bottom: 2rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .image-wrapper img {
      display: block;
      width: 100%;
      height: auto;
    }

    .share-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background-color: #2a2a2a;
      color: #c0c0c0;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      font-size: 1rem;
      text-decoration: none;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    .share-button:hover {
      background-color: #333;
      border-color: #555;
      color: #fff;
    }

    .share-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>オナニーが終わったらこのエクを投稿してください</h1>

    <div class="image-wrapper">
      <img src="./image.png" alt="image">
    </div>

    <p style="color:#b0b0b0; margin-bottom:1rem; font-size:1rem;">画像をポストする</p>

    <a class="share-button"
       href="https://twitter.com/intent/tweet?url=https%3A%2F%2Feo.nzm.io%2F"
       target="_blank"
       rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      </svg>
      Post
    </a>
  </div>
